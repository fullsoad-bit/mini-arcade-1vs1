<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Juegos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .menu-container {
            background-color: #34495e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            width: 300px;
        }
        h1 {
            margin-bottom: 20px;
            color: #1abc9c;
        }
        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .menu-item {
            margin: 15px 0;
        }
        .menu-link {
            display: block;
            padding: 12px;
            background-color: #1abc9c;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
            font-weight: bold;
        }
        .menu-link:hover {
            background-color: #16a085;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>Mis Juegos</h1>
        <ul class="menu-list">
            <!-- Menú existente -->
            <li class="menu-item">
                <a href="#" class="menu-link" onclick="cargarJuego('tetris.js')">Tetris</a>
            </li>
            <li class="menu-item">
                <a href="#" class="menu-link" onclick="cargarJuego('pong.js')">Pong</a>
            </li>
            
            <!-- Juegos nuevos agregados -->
            <li class="menu-item">
                <a href="#" class="menu-link" onclick="cargarJuego('space.js')">Space Invaders</a>
            </li>
            <li class="menu-item">
                <a href="#" class="menu-link" onclick="cargarJuego('snake.js')">Snake</a>
            </li>
        </ul>
    </div>

    <!-- Contenedor para el canvas o área de juego -->
    <div id="game-container"></div>

    <script>
        function cargarJuego(scriptSrc) {
            // Limpia el contenedor antes de cargar un nuevo juego
            const container = document.getElementById('game-container');
            container.innerHTML = '';
            
            // Remueve scripts de juegos anteriores si existen
            const scriptExistente = document.getElementById('script-juego');
            if (scriptExistente) {
                scriptExistente.remove();
            }

            // Crea y carga el nuevo script del juego
            const nuevoScript = document.createElement('script');
            nuevoScript.src = scriptSrc;
            nuevoScript.id = 'script-juego';
            document.body.appendChild(nuevoScript);
            
            console.log('Cargando: ' + scriptSrc);
        }
    </script>
</body>
</html>
