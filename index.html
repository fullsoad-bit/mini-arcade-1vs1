<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINI 1vs1 | Arcade LAN</title>
    
    <!-- Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <!-- Librería Socket.io (OBLIGATORIA) -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Scripts de Juegos (Rutas corregidas para el servidor) -->
    <script src="/js/pingpong.js"></script>
    <script src="/js/carrera.js"></script>
    <script src="/js/tetrix.js"></script>
    <script src="/js/tiro.js"></script>
    
    <style>
        :root {
            --neon-green: #39FF14;
            --neon-pink: #FF00FF;
            --bg-color: #0d0208;
            --text-readable: 'Roboto', sans-serif; 
            --text-retro: 'Press Start 2P', cursive;
        }

        body {
            background-color: var(--bg-color);
            color: var(--neon-green);
            font-family: var(--text-readable); 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-shadow: 2px 2px #000;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Capas de visualización */
        #ui-layer { width: 100%; display: flex; flex-direction: column; align-items: center; }
        #game-container { display: none; width: 100%; text-align: center; margin-top: 20px; }

        /* Efecto Monitor CRT */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 1000;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        h1 { font-family: var(--text-retro); font-size: 2.2rem; color: var(--neon-pink); margin-top: 50px; text-align: center; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            width: 80%;
            margin-top: 30px;
            z-index: 10;
        }

        .game-card {
            font-family: var(--text-retro);
            border: 4px solid var(--neon-green);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            background: rgba(57, 255, 20, 0.05);
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .game-card:hover {
            background-color: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }

        /* Modal */
        #room-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-color);
            border: 6px double var(--neon-pink);
            padding: 40px;
            z-index: 2000;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.3);
        }

        input {
            background: #000;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px;
            font-family: var(--text-readable); 
            margin: 10px 0;
            width: 80%;
            text-align: center;
        }

        .btn {
            background: var(--neon-pink);
            color: white;
            border: none;
            padding: 15px 25px;
            font-family: var(--text-retro);
            cursor: pointer;
            font-size: 0.7rem;
        }

        .ad-space { width: 100%; max-width: 728px; height: 90px; background: #111; margin: 20px 0; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; border: 1px dashed #555; color: #444; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="ad-space">MODO ONLINE ACTIVO</div>

        <h1>MINI 1vs1</h1>
        <p style="font-family: var(--text-retro); font-size: 0.7rem;">ELIGE TU DESAFÍO EN RED</p>

        <div class="game-grid">
            <div class="game-card" onclick="openModal('PING PONG')">PING PONG</div>
            <div class="game-card" onclick="openModal('CARRERA 2D')">CARRERA 2D</div>
            <div class="game-card" onclick="openModal('TETRIX')">TETRIX (3 MIN)</div>
            <div class="game-card" onclick="openModal('TIRO AL BLANCO')">TIRO AL BLANCO</div>
        </div>
    </div>

    <!-- Contenedor donde se inyectará el canvas de cada juego -->
    <div id="game-container"></div>

    <!-- Modal de Salas -->
    <div id="room-modal">
        <h2 id="selected-game-title" style="font-family: var(--text-retro); font-size: 1rem;">JUEGO</h2>
        <p style="font-size: 0.8rem; font-weight: bold;">CREAR NUEVA PARTIDA</p>
        <button class="btn" onclick="generateRoom()">GENERAR SALA</button>
        
        <div id="room-info" style="margin-top: 15px; color: var(--neon-pink); font-size: 0.8rem; font-weight: bold;"></div>
        
        <hr style="border: 1px solid #333; margin: 20px 0;">
        <p style="font-size: 0.8rem; font-weight: bold;">UNIRSE A SALA</p>
        
        <input type="text" id="room-id" placeholder="ID SALA">
        <input type="password" id="room-pass" placeholder="PASSWORD">
        
        <br>
        <button class="btn" onclick="joinRoom()">ENTRAR</button>
        <p onclick="closeModal()" style="cursor:pointer; font-size: 0.6rem; margin-top: 20px; color: #666; font-family: var(--text-retro);">[ CERRAR ]</p>
    </div>

    <script>
        // Conexión automática al origen de la ventana (Render/Local)
        const socket = (typeof io !== 'undefined') ? io(window.location.origin) : null; 
        
        let soyAnfitrion = false;
        let idSalaActual = "";

        const uiLayer = document.getElementById('ui-layer');
        const gameContainer = document.getElementById('game-container');
        const modal = document.getElementById('room-modal');
        const title = document.getElementById('selected-game-title');

        function openModal(gameName) {
            modal.style.display = 'block';
            title.innerText = gameName;
            document.getElementById('room-info').innerHTML = ""; 
        }

        function closeModal() { modal.style.display = 'none'; }

        function generateRoom() {
            const pass = document.getElementById('room-pass').value || "123";
            const game = title.innerText;
            if(socket) {
                soyAnfitrion = true;
                socket.emit('create_room', { password: pass, game: game });
            }
        }

        function joinRoom() {
            const id = document.getElementById('room-id').value;
            const pass = document.getElementById('room-pass').value;
            if(socket) {
                soyAnfitrion = false;
                socket.emit('join_room', { roomId: id, password: pass });
            }
        }

        if(socket) {
            socket.on('room_created', (data) => {
                idSalaActual = data.roomId;
                document.getElementById('room-info').innerHTML = 
                    `SALA: ${data.roomId}<br>PASS: ${data.password}<br>ESPERANDO RIVAL...`;
            });

            socket.on('player_joined', (data) => {
                console.log("¡Jugador detectado! Iniciando:", data.game);
                idSalaActual = data.roomId || idSalaActual;
                closeModal();
                iniciarJuego(data.game);
            });

            socket.on('error_msg', (msg) => { alert(msg); });
        }

        function iniciarJuego(nombre) {
            uiLayer.style.display = "none";
            gameContainer.style.display = "block";
            
            // Llamar a las funciones según el nombre devuelto por el servidor
            if(nombre === "PING PONG") {
                if(typeof startPingPong === 'function') startPingPong(idSalaActual, soyAnfitrion);
            } 
            else if(nombre === "CARRERA 2D") {
                if(typeof startRacing === 'function') startRacing(idSalaActual, soyAnfitrion);
            } 
            else if(nombre === "TETRIX") {
                if(typeof startTetrix === 'function') startTetrix(idSalaActual, soyAnfitrion);
            } 
            else if(nombre === "TIRO AL BLANCO") {
                if(typeof startTiro === 'function') startTiro(idSalaActual, soyAnfitrion);
            }
        }
    </script>
</body>
</html>
