<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MINI 1vs1 | Arcade Online</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    
    <!-- 1. Librería Socket.io -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        // 2. Creación del socket global
        const socket = io(); 
    </script>

    <style>
        :root { --neon-green: #39FF14; --neon-pink: #FF00FF; --bg-color: #0d0208; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--neon-green); 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            touch-action: manipulation; 
            overflow-x: hidden;
        }

        #ui-layer { width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; padding-bottom: 100px; }
        #game-container { display: none; width: 100%; text-align: center; margin-top: 20px; }
        
        /* Asegura que el canvas del juego se vea bien */
        canvas { border: 4px solid var(--neon-pink); background: #000; box-shadow: 0 0 20px var(--neon-pink); }

        h1 { 
            font-family: 'Press Start 2P', cursive; 
            font-size: 2.2rem; 
            color: var(--neon-pink); 
            margin-top: 50px; 
            margin-bottom: 10px; 
            text-shadow: 4px 4px 0px #000; 
            text-align: center; 
        }
        
        .subtitle { 
            font-family: 'Press Start 2P', cursive; 
            font-size: 0.8rem; 
            color: #fff; 
            margin-bottom: 40px; 
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border: 1px solid var(--neon-pink);
            border-radius: 5px;
        }

        .game-grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 90%; max-width: 500px; }
        
        .game-card { 
            font-family: 'Press Start 2P', cursive; 
            border: 4px solid var(--neon-green); 
            padding: 25px 10px; 
            text-align: center; 
            cursor: pointer; 
            background: #000; 
            transition: 0.2s; 
            font-size: 1rem; 
            font-weight: bold;
            color: var(--neon-green);
            text-shadow: 2px 2px 0px #000;
        }

        .game-card:hover { background-color: var(--neon-green); color: black; text-shadow: none; }

        #room-modal { 
            display: none; 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: #000; 
            border: 5px solid var(--neon-pink); 
            padding: 30px; 
            z-index: 2000; 
            width: 90%; 
            max-width: 400px; 
            text-align: center;
        }
        
        input { 
            background: #111; 
            border: 3px solid var(--neon-green); 
            color: #fff; 
            padding: 15px; 
            margin: 10px 0; 
            width: 85%; 
            text-align: center; 
            font-size: 1.5rem; 
            font-weight: bold;
        }
        
        .btn { 
            background: var(--neon-pink); 
            color: white; 
            border: none; 
            padding: 20px; 
            font-family: 'Press Start 2P', cursive; 
            cursor: pointer; 
            font-size: 1rem; 
            width: 100%; 
            margin-top: 15px; 
        }

        footer { position: fixed; bottom: 20px; right: 20px; z-index: 5000; }
        .frutilla { font-size: 45px; filter: drop-shadow(0 0 10px red); cursor: pointer; user-select: none; }

        .pablo-head {
            position: fixed;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-image: url('/pablo.jpg'); 
            background-size: cover;        
            background-position: center 25%; 
            background-repeat: no-repeat;
            border: 3px solid var(--neon-pink);
            z-index: 9999;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon-pink);
            animation: floatMove 8s infinite ease-in-out, rotateSlow 6s infinite linear;
        }

        @keyframes floatMove {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(60px, 120px); }
            50% { transform: translate(-60px, 240px); }
            75% { transform: translate(120px, 60px); }
        }

        @keyframes rotateSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .explode {
            transform: scale(4) !important;
            opacity: 0 !important;
            transition: all 0.4s ease-out;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>MINI 1vs1</h1>
        <div class="subtitle">de Dexter servicio técnico</div>

        <div class="game-grid">
            <div class="game-card" onclick="openModal('PING PONG', 'pingpong')">PING PONG</div>
            <div class="game-card" onclick="openModal('CARRERA 2D', 'carrera')">CARRERA 2D</div>
            <div class="game-card" onclick="openModal('TETRIX', 'tetrix')">TETRIX</div>
            <div class="game-card" onclick="openModal('TIRO', 'tiro')">TIRO AL BLANCO</div>
            <div class="game-card" onclick="openModal('LABERINTO', 'laberinto')">LABERINTO NEÓN</div>
            <div class="game-card" onclick="openModal('SNAKE', 'snake')">SNAKE</div>
            <div class="game-card" onclick="openModal('SPACE', 'space')">SPACE</div>
        </div>
    </div>

    <!-- El contenedor del juego ahora está limpio y listo para recibir el canvas -->
    <div id="game-container"></div>

    <div id="room-modal">
        <h2 id="selected-game-title" style="font-family: 'Press Start 2P'; color: var(--neon-pink);">JUEGO</h2>
        <button class="btn" onclick="generateRoom()">CREAR SALA</button>
        <div id="room-info" style="margin-top:20px; color:#39FF14; font-size:1.2rem; font-weight: bold;"></div>
        <hr style="border: 0; border-top: 2px solid #333; margin: 25px 0;">
        <p style="color:#fff">UNIRSE A PARTIDA</p>
        <input type="number" id="room-id" placeholder="ID SALA">
        <input type="text" id="room-pass" placeholder="PASS" value="123">
        <button class="btn" onclick="joinRoom()">UNIRSE</button>
        <p onclick="closeModal()" style="cursor:pointer; color: #ff4d4d; margin-top: 25px; font-family: 'Press Start 2P'; font-size: 0.8rem;">[ CANCELAR ]</p>
    </div>

    <footer>
        <div class="frutilla" onclick="handleStrawberryClick()">🍓</div>
    </footer>

    <script>
        let soyAnfitrion = false;
        let idSalaActual = null;
        let clicksFrutilla = 0;
        let timerFrutilla;
        let juegoSeleccionado = ''; 
        let archivoJuego = ''; 

        // --- SISTEMA DE MODAL Y ASIGNACIÓN ---
        function openModal(gameName, fileName) {
            juegoSeleccionado = gameName;
            archivoJuego = fileName; 
            document.getElementById('selected-game-title').innerText = gameName;
            document.getElementById('room-modal').style.display = 'block';
            document.getElementById('room-info').innerText = '';
        }

        function closeModal() {
            document.getElementById('room-modal').style.display = 'none';
        }

        // --- INTERACCIÓN CON EL SERVER.JS ---
        function generateRoom() {
            const passInput = document.getElementById('room-pass').value || "123";
            soyAnfitrion = true;
            
            // Envío correcto según tu server.js
            socket.emit('create_room', { password: passInput, game: archivoJuego });
        }

        function joinRoom() {
            const idInput = document.getElementById('room-id').value;
            const passInput = document.getElementById('room-pass').value;
            
            if(!idInput) return alert("Ingresa el ID de la sala");
            
            soyAnfitrion = false;
            // Envío correcto según tu server.js
            socket.emit('join_room', { roomId: idInput, password: passInput });
        }

        // --- RESPUESTAS DEL SERVIDOR ---
        socket.on('room_created', (data) => {
            idSalaActual = data.roomId;
            document.getElementById('room-info').innerText = `SALA: ${data.roomId} | PASS: ${data.password}`;
            // En salas creadas, esperamos al segundo jugador para arrancar
        });

        socket.on('player_joined', (data) => {
            idSalaActual = data.roomId;
            alert("¡Jugador conectado! Iniciando juego...");
            closeModal();
            iniciarJuegoDinamico(data.game);
        });

        socket.on('error_msg', (msg) => {
            alert(msg);
        });

        // --- CARGA DINÁMICA DE JUEGOS ---
        function iniciarJuegoDinamico(nombreArchivo) {
            document.getElementById('ui-layer').style.display = 'none';
            const container = document.getElementById('game-container');
            container.style.display = 'block';
            
            // 1. Limpiamos por si había algo antes
            container.innerHTML = ''; 
            
            // 2. Creamos el canvas de manera forzada para los juegos
            const canvas = document.createElement('canvas');
            canvas.id = 'gameCanvas';
            canvas.width = 400; // Medidas estándar de arcade
            canvas.height = 400;
            container.appendChild(canvas);
            
            // 3. Inyectamos solo el script del juego elegido
            const script = document.createElement('script');
            script.src = `/js/${nombreArchivo}.js?v=dexter_final`;
            document.body.appendChild(script);
        }

        // --- EASTER EGG ---
        function handleStrawberryClick() {
            clicksFrutilla++;
            clearTimeout(timerFrutilla);
            if (clicksFrutilla === 3) {
                spawnPablos();
                clicksFrutilla = 0;
            } else {
                timerFrutilla = setTimeout(() => { 
                    clicksFrutilla = 0; 
                    alert('¡Gracias por jugar con nuestra página!'); 
                }, 500);
            }
        }

        function spawnPablos() {
            for (let i = 0; i < 7; i++) {
                const head = document.createElement('div');
                head.className = 'pablo-head';
                head.style.left = Math.random() * 70 + 'vw';
                head.style.top = Math.random() * 70 + 'vh';
                head.onclick = function() {
                    head.classList.add('explode');
                    setTimeout(() => head.remove(), 400);
                };
                document.body.appendChild(head);
            }
        }
    </script>
</body>
</html>
