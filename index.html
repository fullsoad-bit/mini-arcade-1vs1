<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MINI 1vs1 | Arcade Online</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --neon-green: #39FF14; --neon-pink: #FF00FF; --bg-color: #0d0208; }
        body { background-color: var(--bg-color); color: var(--neon-green); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; touch-action: manipulation; }
        #ui-layer { width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        #game-container { display: none; width: 100%; text-align: center; margin-top: 10px; }
        h1 { font-family: 'Press Start 2P', cursive; font-size: 2rem; color: var(--neon-pink); margin-top: 40px; text-shadow: 3px 3px 0px #000; }
        .subtitle { font-family: 'Press Start 2P', cursive; font-size: 0.7rem; color: #fff; margin-bottom: 30px; background: rgba(0,0,0,0.7); padding: 8px; border: 1px solid var(--neon-pink); }
        .game-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 90%; max-width: 400px; }
        .game-card { font-family: 'Press Start 2P', cursive; border: 3px solid var(--neon-green); padding: 20px; text-align: center; cursor: pointer; background: #000; font-size: 0.8rem; color: var(--neon-green); }
        .game-card:hover { background: var(--neon-green); color: #000; }
        #room-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 4px solid var(--neon-pink); padding: 25px; z-index: 2000; width: 80%; max-width: 350px; text-align: center; }
        input { background: #111; border: 2px solid var(--neon-green); color: #fff; padding: 10px; margin: 10px 0; width: 90%; text-align: center; font-size: 1.1rem; }
        .btn { background: var(--neon-pink); color: #fff; border: none; padding: 15px; font-family: 'Press Start 2P', cursive; cursor: pointer; width: 100%; margin-top: 10px; font-size: 0.7rem; }
        footer { position: fixed; bottom: 15px; right: 15px; }
        .frutilla { font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h1>MINI 1vs1</h1>
        <div class="subtitle">Arcade Online</div>
        <div class="game-grid">
            <div class="game-card" onclick="openModal('PING PONG')">PING PONG</div>
            <div class="game-card" onclick="openModal('CARRERA 2D')">CARRERA 2D</div>
            <div class="game-card" onclick="openModal('TETRIX')">TETRIX</div>
            <div class="game-card" onclick="openModal('TIRO AL BLANCO')">TIRO AL BLANCO</div>
            <div class="game-card" onclick="openModal('LABERINTO NEÓN')">LABERINTO NEÓN</div>
            <div class="game-card" onclick="openModal('SNAKE 1vs1')">SNAKE 1vs1</div>
            <div class="game-card" onclick="openModal('SPACE SHOOTER')">SPACE SHOOTER</div>
        </div>
    </div>

    <div id="game-container"></div>

    <div id="room-modal">
        <h2 id="selected-game-title" style="color: var(--neon-pink); font-family: 'Press Start 2P'; font-size: 0.9rem;">SALA</h2>
        <button class="btn" onclick="generateRoom()">CREAR SALA</button>
        <div id="room-info" style="margin: 15px 0; color: var(--neon-green); font-weight: bold;"></div>
        <hr style="border: 1px solid #222;">
        <input type="number" id="room-id" placeholder="ID SALA">
        <input type="text" id="room-pass" value="123">
        <button class="btn" onclick="joinRoom()">UNIRSE</button>
        <p onclick="closeModal()" style="color: red; cursor: pointer; font-size: 0.6rem; margin-top: 15px;">[ CANCELAR ]</p>
    </div>

    <footer><div class="frutilla" onclick="alert('¡A jugar!')">🍓</div></footer>

    <!-- CARGA DE SCRIPTS AL FINAL PARA EVITAR ERRORES -->
    <script>const socket = io();</script>
    <script src="/js/pingpong.js"></script>
    <script src="/js/carrera.js"></script>
    <script src="/js/tetrix.js"></script>
    <script src="/js/tiro.js"></script>
    <script src="/js/laberinto.js"></script>
    <script src="/js/snake.js"></script>
    <script src="/js/space.js"></script>

    <script>
        let soyAnfitrion = false;
        function openModal(name) { document.getElementById('selected-game-title').innerText = name; document.getElementById('room-modal').style.display = 'block'; }
        function closeModal() { document.getElementById('room-modal').style.display = 'none'; }
        function generateRoom() {
            const pass = document.getElementById('room-pass').value;
            const game = document.getElementById('selected-game-title').innerText;
            soyAnfitrion = true; socket.emit('create_room', { password: pass, game: game });
        }
        socket.on('room_created', (data) => { document.getElementById('room-info').innerText = `ID: ${data.roomId} | PASS: ${data.password}`; });
        function joinRoom() {
            const rId = document.getElementById('room-id').value;
            const pass = document.getElementById('room-pass').value;
            soyAnfitrion = false; socket.emit('join_room', { roomId: rId, password: pass });
        }
        socket.on('player_joined', (data) => {
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('room-modal').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            // Lanzador Universal con espera de seguridad
            setTimeout(() => {
                if (data.game === 'PING PONG') startPingPong(data.roomId, soyAnfitrion);
                if (data.game === 'CARRERA 2D') startCarrera(data.roomId, soyAnfitrion);
                if (data.game === 'TETRIX') startTetrix(data.roomId, soyAnfitrion);
                if (data.game === 'TIRO AL BLANCO') startTiro(data.roomId, soyAnfitrion);
                if (data.game === 'LABERINTO NEÓN') startLaberinto(data.roomId, soyAnfitrion);
                if (data.game === 'SNAKE 1vs1') startSnake(data.roomId, soyAnfitrion);
                if (data.game === 'SPACE SHOOTER') startSpace(data.roomId, soyAnfitrion);
            }, 300);
        });
        socket.on('error_msg', (msg) => alert(msg));
    </script>
</body>
</html>
