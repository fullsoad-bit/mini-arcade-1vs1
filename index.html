<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Viewport optimizado para Android: evita zoom y desplazamientos accidentales -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MINI 1vs1 | Arcade Online</title>
    
    <!-- Google Fonts cargadas correctamente -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <!-- Librería Socket.io -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Scripts de Juegos -->
    <script src="/js/pingpong.js"></script>
    <script src="/js/carrera.js"></script>
    <script src="/js/tetrix.js"></script>
    <script src="/js/tiro.js"></script>
    
    <style>
        :root {
            --neon-green: #39FF14;
            --neon-pink: #FF00FF;
            --bg-color: #0d0208;
        }

        body {
            background-color: var(--bg-color);
            color: var(--neon-green);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        #ui-layer { width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; padding-bottom: 50px; }
        #game-container { display: none; width: 100%; text-align: center; margin-top: 10px; position: relative; }

        /* Efecto Monitor CRT Scanlines */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 1000;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        h1 { font-family: 'Press Start 2P', cursive; font-size: 1.5rem; color: var(--neon-pink); margin-top: 30px; text-shadow: 0 0 10px var(--neon-pink); text-align: center; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            width: 90%;
            max-width: 800px;
            margin-top: 20px;
        }

        .game-card {
            font-family: 'Press Start 2P', cursive;
            border: 3px solid var(--neon-green);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: rgba(57, 255, 20, 0.05);
            transition: 0.2s;
            font-size: 0.6rem;
            line-height: 1.4;
        }

        .game-card:hover {
            background-color: var(--neon-green);
            color: black;
            box-shadow: 0 0 15px var(--neon-green);
        }

        #room-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            border: 4px solid var(--neon-pink);
            padding: 20px;
            z-index: 2000;
            text-align: center;
            width: 85%;
            max-width: 350px;
        }

        input {
            background: #111;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px;
            margin: 10px 0;
            width: 85%;
            text-align: center;
            font-size: 1.2rem;
        }

        .btn {
            background: var(--neon-pink);
            color: white;
            border: none;
            padding: 15px;
            font-family: 'Press Start 2P', cursive;
            cursor: pointer;
            font-size: 0.6rem;
            width: 100%;
            margin-top: 10px;
        }

        .status-msg { margin-top: 15px; color: #fff; font-size: 0.8rem; min-height: 40px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>MINI 1vs1</h1>
        <p style="font-family: 'Press Start 2P'; font-size: 0.5rem; color: #fff;">ARCADE MULTIJUGADOR</p>

        <div class="game-grid">
            <div class="game-card" onclick="openModal('PING PONG')">PING PONG</div>
            <div class="game-card" onclick="openModal('CARRERA 2D')">CARRERA 2D</div>
            <div class="game-card" onclick="openModal('TETRIX')">TETRIX</div>
            <div class="game-card" onclick="openModal('TIRO')">TIRO AL BLANCO</div>
        </div>
    </div>

    <div id="game-container"></div>

    <div id="room-modal">
        <h2 id="selected-game-title" style="font-family: 'Press Start 2P'; font-size: 0.8rem; color: var(--neon-pink);">JUEGO</h2>
        <button class="btn" style="background: #222; border: 1px solid var(--neon-green);" onclick="generateRoom()">CREAR SALA</button>
        <div id="room-info" class="status-msg"></div>
        <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
        <input type="number" id="room-id" placeholder="ID SALA" pattern="\d*">
        <input type="text" id="room-pass" placeholder="PASSWORD" value="123">
        <button class="btn" onclick="joinRoom()">UNIRSE</button>
        <p onclick="closeModal()" style="cursor:pointer; font-size: 0.6rem; margin-top: 20px; color: #555;">[ CANCELAR ]</p>
    </div>

    <script>
        const socket = io({ reconnection: true }); 
        let soyAnfitrion = false;
        let idSalaActual = null;

        const uiLayer = document.getElementById('ui-layer');
        const gameContainer = document.getElementById('game-container');
        const modal = document.getElementById('room-modal');
        const title = document.getElementById('selected-game-title');
        const info = document.getElementById('room-info');

        function openModal(gameName) {
            modal.style.display = 'block';
            title.innerText = gameName;
            info.innerHTML = "Genera una sala o únete a una";
        }

        function closeModal() { modal.style.display = 'none'; }

        function generateRoom() {
            const pass = document.getElementById('room-pass').value || "123";
            soyAnfitrion = true;
            socket.emit('create_room', { password: pass, game: title.innerText });
        }

        function joinRoom() {
            const id = document.getElementById('room-id').value;
            const pass = document.getElementById('room-pass').value || "123";
            if(!id) return alert("Escribe el ID de sala");
            soyAnfitrion = false;
            socket.emit('join_room', { roomId: id.toString(), password: pass });
        }

        // --- Lógica de Sockets ---
        socket.on('room_created', (data) => {
            idSalaActual = data.roomId;
            info.innerHTML = `<span style="color:var(--neon-green)">SALA: ${data.roomId}</span><br>Comparte el ID con tu rival`;
        });

        socket.on('player_joined', (data) => {
            // Aseguramos que ambos tengan el mismo ID de sala antes de arrancar
            idSalaActual = data.roomId; 
            console.log("Iniciando partida en sala:", idSalaActual);
            closeModal();
            iniciarJuego(data.game);
        });

        socket.on('error_msg', (msg) => { alert(msg); });

        function iniciarJuego(nombre) {
            if(!idSalaActual) return;
            
            uiLayer.style.display = "none";
            gameContainer.style.display = "block";
            gameContainer.innerHTML = ""; // Limpiar rastro de juegos anteriores

            // Lanzador de juegos
            if(nombre === "CARRERA 2D") {
                if(typeof startRacing === 'function') startRacing(idSalaActual, soyAnfitrion);
            } else if(nombre === "PING PONG") {
                if(typeof startPingPong === 'function') startPingPong(idSalaActual, soyAnfitrion);
            } else if(nombre === "TETRIX") {
                if(typeof startTetrix === 'function') startTetrix(idSalaActual, soyAnfitrion);
            } else if(nombre === "TIRO") {
                if(typeof startTiro === 'function') startTiro(idSalaActual, soyAnfitrion);
            }
        }
    </script>
</body>
</html>
