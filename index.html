<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MINI 1vs1 | Arcade Online</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    
    <!-- 1. CARGAMOS LA LIBRERÍA PRIMERO -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        // 2. CREAMOS EL SOCKET INMEDIATAMENTE PARA QUE SEA GLOBAL
        const socket = io(); 
    </script>

    <!-- 3. AHORA CARGAMOS LOS JUEGOS (Ya no darán error de "socket is not defined") -->
    <script src="/js/pingpong.js?v=99"></script>
    <script src="/js/carrera.js?v=99"></script>
    <script src="/js/tetrix.js?v=99"></script>
    <script src="/js/tiro.js?v=99"></script>
    
    <style>
        :root { --neon-green: #39FF14; --neon-pink: #FF00FF; --bg-color: #0d0208; }
        body { background-color: var(--bg-color); color: var(--neon-green); font-family: 'Roboto', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; touch-action: manipulation; }
        #ui-layer { width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; padding-bottom: 50px; }
        #game-container { display: none; width: 100%; text-align: center; margin-top: 10px; position: relative; }
        h1 { font-family: 'Press Start 2P', cursive; font-size: 1.5rem; color: var(--neon-pink); margin-top: 30px; text-shadow: 0 0 10px var(--neon-pink); text-align: center; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; width: 90%; max-width: 800px; margin-top: 20px; }
        .game-card { font-family: 'Press Start 2P', cursive; border: 3px solid var(--neon-green); padding: 15px; text-align: center; cursor: pointer; background: rgba(57, 255, 20, 0.05); transition: 0.2s; font-size: 0.6rem; }
        .game-card:hover { background-color: var(--neon-green); color: black; box-shadow: 0 0 15px var(--neon-green); }
        #room-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 4px solid var(--neon-pink); padding: 20px; z-index: 2000; text-align: center; width: 85%; max-width: 350px; }
        input { background: #111; border: 2px solid var(--neon-green); color: var(--neon-green); padding: 12px; margin: 10px 0; width: 85%; text-align: center; font-size: 1.2rem; }
        .btn { background: var(--neon-pink); color: white; border: none; padding: 15px; font-family: 'Press Start 2P', cursive; cursor: pointer; font-size: 0.6rem; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>MINI 1vs1</h1>
        <p style="font-family: 'Press Start 2P'; font-size: 0.5rem; color: #fff;">ARCADE ONLINE FIX</p>
        <div class="game-grid">
            <div class="game-card" onclick="openModal('PING PONG')">PING PONG</div>
            <div class="game-card" onclick="openModal('CARRERA 2D')">CARRERA 2D</div>
            <div class="game-card" onclick="openModal('TETRIX')">TETRIX</div>
            <div class="game-card" onclick="openModal('TIRO')">TIRO AL BLANCO</div>
        </div>
    </div>

    <div id="game-container"></div>

    <div id="room-modal">
        <h2 id="selected-game-title" style="font-family: 'Press Start 2P'; font-size: 0.8rem; color: var(--neon-pink);">JUEGO</h2>
        <button class="btn" onclick="generateRoom()">CREAR SALA</button>
        <div id="room-info" style="margin-top:10px; color:#fff; font-size:0.8rem;"></div>
        <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
        <input type="number" id="room-id" placeholder="ID SALA">
        <input type="text" id="room-pass" placeholder="PASS" value="123">
        <button class="btn" onclick="joinRoom()">UNIRSE</button>
        <p onclick="closeModal()" style="cursor:pointer; font-size: 0.6rem; margin-top: 20px; color: #555;">[ CANCELAR ]</p>
    </div>

    <script>
        let soyAnfitrion = false;
        let idSalaActual = null;

        function openModal(gameName) {
            document.getElementById('room-modal').style.display = 'block';
            document.getElementById('selected-game-title').innerText = gameName;
        }

        function closeModal() { document.getElementById('room-modal').style.display = 'none'; }

        function generateRoom() {
            const pass = document.getElementById('room-pass').value || "123";
            soyAnfitrion = true;
            socket.emit('create_room', { password: pass, game: document.getElementById('selected-game-title').innerText });
        }

        function joinRoom() {
            const id = document.getElementById('room-id').value;
            const pass = document.getElementById('room-pass').value || "123";
            soyAnfitrion = false;
            socket.emit('join_room', { roomId: id.toString(), password: pass });
        }

        socket.on('room_created', (data) => {
            idSalaActual = data.roomId;
            document.getElementById('room-info').innerHTML = `SALA: ${data.roomId}<br>Esperando rival...`;
        });

        socket.on('player_joined', (data) => {
            idSalaActual = data.roomId; 
            closeModal();
            iniciarJuego(data.game);
        });

        socket.on('error_msg', (msg) => { alert(msg); });

        function iniciarJuego(nombre) {
            document.getElementById('ui-layer').style.display = "none";
            document.getElementById('game-container').style.display = "block";
            document.getElementById('game-container').innerHTML = ""; 

            if(nombre === "CARRERA 2D") startRacing(idSalaActual, soyAnfitrion);
            else if(nombre === "PING PONG") startPingPong(idSalaActual, soyAnfitrion);
            else if(nombre === "TETRIX") startTetrix(idSalaActual, soyAnfitrion);
            else if(nombre === "TIRO") startTiro(idSalaActual, soyAnfitrion);
        }
    </script>
</body>
</html>
