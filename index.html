<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MINI 1vs1 | Arcade Online</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    
    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io(); 
    </script>

    <script src="/js/pingpong.js?v=dexter_v3"></script>
    <script src="/js/carrera.js?v=dexter_v3"></script>
    <script src="/js/tetrix.js?v=dexter_v3"></script>
    <script src="/js/tiro.js?v=dexter_v3"></script>
    <script src="/js/laberinto.js?v=dexter_v3"></script>
    
    <style>
        :root { --neon-green: #39FF14; --neon-pink: #FF00FF; --bg-color: #0d0208; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--neon-green); 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            touch-action: manipulation; 
        }

        #ui-layer { width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; padding-bottom: 100px; }
        #game-container { display: none; width: 100%; text-align: center; margin-top: 10px; }

        /* Título Principal Gigante */
        h1 { 
            font-family: 'Press Start 2P', cursive; 
            font-size: 2.2rem; /* Aumentado */
            color: var(--neon-pink); 
            margin-top: 50px; 
            margin-bottom: 10px; 
            text-shadow: 4px 4px 0px #000; 
            text-align: center; 
        }
        
        /* Subtítulo Dexter Legible */
        .subtitle { 
            font-family: 'Press Start 2P', cursive; 
            font-size: 0.8rem; /* Aumentado */
            color: #fff; 
            margin-bottom: 40px; 
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border: 1px solid var(--neon-pink);
            border-radius: 5px;
        }

        /* Cuadrícula de juegos */
        .game-grid { 
            display: grid; 
            grid-template-columns: 1fr; /* Una columna en móvil para que sean botones anchos */
            gap: 20px; 
            width: 90%; 
            max-width: 500px; 
        }
        
        /* Botones de Juego (Cartas) mucho más grandes */
        .game-card { 
            font-family: 'Press Start 2P', cursive; 
            border: 4px solid var(--neon-green); 
            padding: 25px 10px; /* Más alto */
            text-align: center; 
            cursor: pointer; 
            background: #000; /* Fondo negro puro para contraste máximo */
            transition: 0.2s; 
            font-size: 1rem; /* Letra mucho más grande */
            font-weight: bold;
            color: var(--neon-green);
            text-shadow: 2px 2px 0px #000;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
        }

        .game-card:hover { background-color: var(--neon-green); color: black; text-shadow: none; }

        /* Modal con textos grandes */
        #room-modal { 
            display: none; 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: #000; 
            border: 5px solid var(--neon-pink); 
            padding: 30px; 
            z-index: 2000; 
            width: 90%; 
            max-width: 400px; 
        }
        
        #room-modal h2 { font-size: 1.4rem; margin-bottom: 20px; }
        #room-modal p { font-size: 1.1rem; color: #fff; font-weight: bold; margin: 15px 0; }

        input { 
            background: #111; 
            border: 3px solid var(--neon-green); 
            color: #fff; 
            padding: 15px; 
            margin: 10px 0; 
            width: 85%; 
            text-align: center; 
            font-size: 1.5rem; /* Números de ID gigantes */
            font-weight: bold;
        }
        
        .btn { 
            background: var(--neon-pink); 
            color: white; 
            border: none; 
            padding: 20px; 
            font-family: 'Press Start 2P', cursive; 
            cursor: pointer; 
            font-size: 1rem; /* Texto de botones grande */
            width: 100%; 
            margin-top: 15px; 
            text-shadow: 2px 2px #000;
        }

        footer { position: fixed; bottom: 20px; right: 20px; z-index: 1001; }
        .frutilla { font-size: 45px; filter: drop-shadow(0 0 10px red); cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>MINI 1vs1</h1>
        <div class="subtitle">de Dexter servicio técnico</div>

        <div class="game-grid">
            <div class="game-card" onclick="openModal('PING PONG')">PING PONG</div>
            <div class="game-card" onclick="openModal('CARRERA 2D')">CARRERA 2D</div>
            <div class="game-card" onclick="openModal('TETRIX')">TETRIX</div>
            <div class="game-card" onclick="openModal('TIRO')">TIRO AL BLANCO</div>
            <div class="game-card" onclick="openModal('LABERINTO')">LABERINTO NEÓN</div>
        </div>
    </div>

    <div id="game-container"></div>

    <div id="room-modal">
        <h2 id="selected-game-title" style="font-family: 'Press Start 2P'; color: var(--neon-pink);">JUEGO</h2>
        <button class="btn" onclick="generateRoom()">CREAR SALA</button>
        <div id="room-info" style="margin-top:20px; color:#39FF14; font-size:1.2rem; font-weight: bold; background: #111; padding: 10px; border: 1px dashed var(--neon-green);"></div>
        <hr style="border: 0; border-top: 2px solid #333; margin: 25px 0;">
        <p>UNIRSE A PARTIDA</p>
        <input type="number" id="room-id" placeholder="ID SALA">
        <input type="text" id="room-pass" placeholder="PASS" value="123">
        <button class="btn" onclick="joinRoom()">UNIRSE</button>
        <p onclick="closeModal()" style="cursor:pointer; font-size: 0.9rem; margin-top: 30px; color: #ff4d4d; font-family: 'Press Start 2P';">[ CANCELAR ]</p>
    </div>

    <footer>
        <div class="frutilla" onclick="alert('¡Gracias por jugar con nuestra página!')">🍓</div>
    </footer>

    <script>
        let soyAnfitrion = false;
        let idSalaActual = null;

        function openModal(gameName) {
            document.getElementById('room-modal').style.display = 'block';
            document.getElementById('selected-game-title').innerText = gameName;
            document.getElementById('room-info').innerHTML = "";
        }

        function closeModal() { document.getElementById('room-modal').style.display = 'none'; }

        function generateRoom() {
            const pass = document.getElementById('room-pass').value || "123";
            soyAnfitrion = true;
            socket.emit('create_room', { password: pass, game: document.getElementById('selected-game-title').innerText });
        }

        function joinRoom() {
            const id = document.getElementById('room-id').value;
            const pass = document.getElementById('room-pass').value || "123";
            soyAnfitrion = false;
            socket.emit('join_room', { roomId: id.toString(), password: pass });
        }

        socket.on('room_created', (data) => {
            idSalaActual = data.roomId;
            document.getElementById('room-info').innerHTML = `SALA: ${data.roomId}<br>PASS: ${data.password}`;
        });

        socket.on('player_joined', (data) => {
            idSalaActual = data.roomId; 
            closeModal();
            iniciarJuego(data.game);
        });

        socket.on('error_msg', (msg) => { alert(msg); });

        function iniciarJuego(nombre) {
            document.getElementById('ui-layer').style.display = "none";
            document.getElementById('game-container').style.display = "block";
            document.getElementById('game-container').innerHTML = ""; 

            if(nombre === "CARRERA 2D") startRacing(idSalaActual, soyAnfitrion);
            else if(nombre === "PING PONG") startPingPong(idSalaActual, soyAnfitrion);
            else if(nombre === "TETRIX") startTetrix(idSalaActual, soyAnfitrion);
            else if(nombre === "TIRO") startTiro(idSalaActual, soyAnfitrion);
            else if(nombre === "LABERINTO") startLaberinto(idSalaActual, soyAnfitrion);
        }
    </script>
</body>
</html>
